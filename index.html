<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escalation probability</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: linear-gradient(165deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 1.25rem 1.75rem;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92) 0%, rgba(30, 41, 59, 0.88) 50%, rgba(15, 23, 42, 0.92) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      font-size: 0.95rem;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 10%, rgba(56, 189, 248, 0.35) 50%, transparent 90%);
      pointer-events: none;
    }
    header .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    header .header-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header .info-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: #94a3b8;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    header .info-link:hover {
      background: rgba(56, 189, 248, 0.12);
      border-color: rgba(56, 189, 248, 0.4);
      color: #38bdf8;
      transform: scale(1.05);
    }
    header .info-link svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    header .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(56, 189, 248, 0.2), rgba(56, 189, 248, 0.05));
      border: 1px solid rgba(56, 189, 248, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    header .header-title {
      margin: 0;
      font-weight: 700;
      font-size: 1.05rem;
      color: #f1f5f9;
      letter-spacing: 0.02em;
    }
    header .header-sub {
      margin: 0.2rem 0 0;
      font-size: 0.85rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
      font-weight: 400;
    }
    #map {
      width: 100%;
      height: 100%;
      border-radius: 0;
    }
    #map .leaflet-tile-pane { filter: saturate(0.85) brightness(0.95); }
    #result {
      padding: 1.35rem 1.75rem;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.94) 0%, rgba(15, 23, 42, 0.98) 100%);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(148, 163, 184, 0.12);
      min-height: 5rem;
      font-size: 0.95rem;
      flex-shrink: 0;
      position: relative;
    }
    #result::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 10%, rgba(56, 189, 248, 0.35) 50%, transparent 90%);
      pointer-events: none;
    }
    #result.empty {
      color: #64748b;
    }
    #result.empty .result-content {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    #result .result-dot {
      display: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.5);
      flex-shrink: 0;
    }
    #result.empty .result-dot {
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    #result:not(.empty) .result-content {
      border-left: 3px solid rgba(56, 189, 248, 0.6);
      padding-left: 1rem;
    }
    #result .prob {
      font-weight: 700;
      font-size: 1.25rem;
      color: #38bdf8;
      letter-spacing: 0.02em;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    }
    #result .error-msg {
      color: #f87171;
    }
    #result strong {
      color: #f1f5f9;
      font-weight: 600;
    }
    .leaflet-interactive {
      cursor: pointer;
      transition: fill 0.2s ease, filter 0.2s ease;
    }
    .leaflet-interactive:hover {
      fill: #475569;
      filter: brightness(1.1);
    }
    .leaflet-interactive.selected {
      fill: #0ea5e9;
      filter: brightness(1.15);
    }
    .leaflet-control-attribution {
      display: none !important;
    }
    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .map-overlay-topright {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 500;
    }
    .contribute-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-decoration: none;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .contribute-btn:hover {
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.4);
      background: rgba(15, 23, 42, 0.95);
    }
    .country-tooltip {
      background: rgba(15, 23, 42, 0.95) !important;
      border: 1px solid rgba(148, 163, 184, 0.25) !important;
      color: #e2e8f0 !important;
      font-family: 'DM Sans', system-ui, sans-serif !important;
      font-size: 0.85rem !important;
      padding: 0.4rem 0.65rem !important;
      border-radius: 6px !important;
      white-space: nowrap !important;
    }
    .country-tooltip::before {
      border-top-color: rgba(15, 23, 42, 0.95) !important;
    }
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .popup-overlay.visible {
      display: flex;
    }
    .popup-box {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 1.5rem 1.75rem;
      max-width: 440px;
      width: 100%;
      max-height: none;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: max-width 0.25s ease;
      margin: auto;
    }
    .popup-box.has-trend {
      max-width: 540px;
      padding: 1.6rem 1.9rem;
    }
    .popup-box h3 {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .popup-box .countries {
      font-size: 1.15rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    .popup-box .countries span.sep {
      color: #64748b;
      font-weight: 400;
      margin: 0 0.25rem;
    }
    .popup-box .prob-value {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }
    .popup-box .risk-badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    .popup-box .risk-low { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .popup-box .risk-medium { background: rgba(234, 179, 8, 0.2); color: #facc15; }
    .popup-box .risk-high { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .popup-box .error-msg { color: #f87171; font-size: 0.85rem; }
    .popup-trend-wrap {
      margin-top: 1.25rem;
      margin-bottom: 1rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }
    .popup-trend-wrap h4 {
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      margin: 0 0 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .popup-trend-wrap h4::before {
      content: '';
      width: 4px;
      height: 14px;
      background: linear-gradient(180deg, #38bdf8, #0ea5e9);
      border-radius: 2px;
    }
    .popup-trend-chart {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.6) 0%, rgba(15, 23, 42, 0.4) 100%);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      padding: 0.85rem;
      min-height: 200px;
      position: relative;
    }
    .popup-trend-chart canvas {
      max-width: 100%;
      height: auto !important;
    }
    .popup-trend-caption {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }
    .popup-box .hint {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.75rem;
    }
    .popup-explanation-wrap {
      margin-top: 1rem;
      margin-bottom: 0.75rem;
    }
    .popup-explanation-wrap h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin: 0 0 0.5rem;
      letter-spacing: 0.03em;
    }
    .popup-explanation {
      max-height: 280px;
      overflow-y: auto;
      padding: 0;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .popup-box.has-trend .popup-explanation {
      max-height: 220px;
    }
    .explain-summary {
      padding: 0.6rem 0.85rem;
      color: #64748b;
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }
    .explain-table {
      width: 100%;
      border-collapse: collapse;
    }
    .explain-table th {
      text-align: left;
      padding: 0.5rem 0.85rem;
      font-weight: 600;
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }
    .explain-table th:nth-child(1) { width: 38%; }
    .explain-table th:nth-child(2) { width: 12%; }
    .explain-table th:nth-child(3) { width: 22%; }
    .explain-table th:nth-child(4) { width: 28%; }
    .explain-table td {
      padding: 0.5rem 0.85rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      color: #cbd5e1;
      vertical-align: top;
    }
    .explain-table tr:last-child td { border-bottom: none; }
    .explain-table .contrib-up { color: #f87171; }
    .explain-table .contrib-down { color: #4ade80; }
    .explain-table .contrib-neutral { color: #64748b; }
    .popup-box button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #38bdf8;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .popup-box button:hover {
      background: rgba(56, 189, 248, 0.25);
    }
    @media (max-width: 640px) {
      .popup-overlay {
        padding: 0.5rem;
        align-items: flex-end;
        justify-content: center;
      }
      .popup-box {
        max-width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 1.25rem 1rem;
        border-radius: 16px 16px 0 0;
        margin: 0;
        flex-shrink: 0;
      }
      .popup-box.has-trend {
        max-height: 90vh;
        padding: 1.25rem 1rem;
      }
      .popup-box h3 { font-size: 0.9rem; margin-bottom: 0.75rem; }
      .popup-box .countries { font-size: 1rem; margin-bottom: 0.75rem; }
      .popup-box .prob-value { font-size: 1.6rem; margin-bottom: 0.35rem; }
      .popup-box .risk-badge { margin-bottom: 0.75rem; }
      .popup-box .hint { font-size: 0.8rem; }
      .popup-trend-wrap { margin-top: 1rem; padding: 0.75rem 0; }
      .popup-trend-wrap h4 { font-size: 0.7rem; }
      .popup-trend-chart { min-height: 160px; padding: 0.6rem; }
      .popup-explanation-wrap { margin-top: 0.75rem; margin-bottom: 0.5rem; }
      .popup-explanation-wrap h4 { font-size: 0.75rem; }
      .popup-explanation {
        max-height: 200px;
        font-size: 0.75rem;
      }
      .popup-box.has-trend .popup-explanation { max-height: 160px; }
      .explain-summary { padding: 0.5rem 0.65rem; font-size: 0.7rem; }
      .explain-table th, .explain-table td {
        padding: 0.4rem 0.5rem;
        font-size: 0.65rem;
      }
      .explain-table th:nth-child(1) { width: 36%; }
      .popup-box button {
        min-height: 44px;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        margin-top: 0.75rem;
      }
    }
    @media (max-width: 480px) {
      .popup-overlay { padding: 0.25rem; }
      .popup-box .countries { font-size: 0.95rem; word-break: break-word; }
      .popup-explanation { max-height: 180px; }
      .popup-box.has-trend .popup-explanation { max-height: 140px; }
    }
    .popup-explanation {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .explain-table { min-width: 280px; }
    .footer-links {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      z-index: 100;
    }
    .footer-link {
      font-size: 0.8rem;
      color: #64748b;
      text-decoration: none;
      padding: 0.4rem 0.65rem;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .footer-link:hover {
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.3);
      background: rgba(15, 23, 42, 0.95);
    }
    /* Hot pairs banner — no container, text only */
    #hot-pairs-banner {
      flex-shrink: 0;
      padding: 0.5rem 1.75rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      overflow: hidden;
      position: relative;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }
    #hot-pairs-banner.hidden { display: none; }
    #hot-pairs-banner .hot-pairs-label {
      color: #94a3b8;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #hot-pairs-banner .hot-pairs-track-wrap {
      flex: 1;
      overflow: hidden;
      mask-image: linear-gradient(90deg, transparent 0%, black 2%, black 98%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 2%, black 98%, transparent 100%);
    }
    #hot-pairs-banner .hot-pairs-track {
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: hot-pairs-scroll 35s linear infinite;
      width: max-content;
    }
    #hot-pairs-banner .hot-pairs-track:hover { animation-play-state: paused; }
    @keyframes hot-pairs-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    #hot-pairs-banner .hot-pair-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0;
      border: none;
      border-radius: 0;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      color: #cbd5e1;
      background: none;
      font-family: inherit;
      font-size: inherit;
      transition: color 0.2s;
    }
    #hot-pairs-banner .hot-pair-item:hover {
      color: #f1f5f9;
    }
    #hot-pairs-banner .hot-pair-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.6);
      flex-shrink: 0;
      animation: hot-pair-dot-pulse 2.5s ease-in-out infinite;
    }
    #hot-pairs-banner .hot-pair-item:nth-child(2) .hot-pair-dot { animation-delay: 0.3s; }
    #hot-pairs-banner .hot-pair-item:nth-child(3) .hot-pair-dot { animation-delay: 0.6s; }
    #hot-pairs-banner .hot-pair-item:nth-child(4) .hot-pair-dot { animation-delay: 0.9s; }
    #hot-pairs-banner .hot-pair-item:nth-child(5) .hot-pair-dot { animation-delay: 1.2s; }
    @keyframes hot-pair-dot-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    #hot-pairs-banner .hot-pair-pct {
      color: #94a3b8;
      font-weight: 600;
      margin-left: 0.15rem;
    }
    #hot-pairs-banner .hot-pair-item:hover .hot-pair-pct {
      color: #38bdf8;
    }
    #hot-pairs-banner .hot-pairs-dismiss {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 4px;
      background: none;
      color: #475569;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.2s;
    }
    #hot-pairs-banner .hot-pairs-dismiss:hover {
      color: #94a3b8;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="header-brand">
          <div class="header-icon" aria-hidden="true">◇</div>
          <div>
            <p class="header-title">Escalation probability</p>
            <p class="header-sub">Select two countries on the map to compare risk</p>
          </div>
        </div>
        <a href="how_does_it_work.html" class="info-link" title="How does it work?" aria-label="How does it work?">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </a>
      </div>
    </header>
    <div id="hot-pairs-banner" class="hidden" aria-label="Higher probability pairs under monitoring">
      <span class="hot-pairs-label">Higher probability pairs</span>
      <div class="hot-pairs-track-wrap">
        <div class="hot-pairs-track" id="hot-pairs-track"></div>
      </div>
      <button type="button" class="hot-pairs-dismiss" id="hot-pairs-dismiss" title="Hide this banner" aria-label="Hide banner">×</button>
    </div>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-overlay-topright">
        <a href="contribute.html" class="contribute-btn">Contribute</a>
      </div>
    </div>
    <div id="result" class="empty">
      <span class="result-dot" aria-hidden="true"></span>
      <div class="result-content">Select the first country...</div>
    </div>
    <div id="popup-overlay" class="popup-overlay" aria-hidden="true">
      <div class="popup-box" id="popup-box">
        <h3 id="popup-title">Escalation probability</h3>
        <div class="countries" id="popup-countries"></div>
        <div class="prob-value" id="popup-prob"></div>
        <div id="popup-risk"></div>
        <p class="hint" id="popup-hint"></p>
        <div class="popup-trend-wrap" id="popup-trend-wrap" style="display: none;">
          <h4>Escalation probability over time</h4>
          <div class="popup-trend-chart">
            <canvas id="popup-trend-chart" width="400" height="200"></canvas>
          </div>
          <p class="popup-trend-caption" id="popup-trend-caption"></p>
        </div>
        <div class="popup-explanation-wrap" id="popup-explanation-wrap">
          <h4>What drove this score?</h4>
          <div class="popup-explanation" id="popup-explanation"></div>
        </div>
        <button type="button" id="popup-close">Close</button>
      </div>
    </div>
    <div class="footer-links">
      <a href="prevent_escalation.html" class="footer-link">What can we do to prevent escalation?</a>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    (function () {
      const GEO_TO_CSV = {
        'Russia': 'Russian Federation',
        'United States of America': 'United States',
        'United Republic of Tanzania': "Tanzania, United Republic of",
        'Iran': "Iran, Islamic Republic of",
        'South Korea': "Korea, Republic of",
        'North Korea': "Korea, Democratic People's Republic of",
        'Vietnam': 'Viet Nam',
        'Bolivia': "Bolivia, Plurinational State of",
        'Venezuela': "Venezuela, Bolivarian Republic of",
        'Moldova': "Moldova, Republic of",
        'Democratic Republic of the Congo': "Congo, The Democratic Republic of the",
        'Republic of the Congo': 'Congo',
        'Taiwan': "Taiwan, Province of China",
        'Syria': 'Syrian Arab Republic',
        'Laos': "Lao People's Democratic Republic",
        'Micronesia': "Micronesia, Federated States of",
        'Ivory Coast': "Côte d'Ivoire",
        'Turkey': 'Türkiye',
        'Macedonia': 'North Macedonia',
        'Swaziland': 'Eswatini',
        'Cape Verde': 'Cabo Verde',
        'W. Sahara': 'Western Sahara',
        'Brunei': 'Brunei Darussalam',
        'Greenland': 'Denmark',
        'Czech Republic': 'Czechia',
        'State of Palestine': 'Palestine, State of',
        'The Gambia': 'Gambia',
        'Bahamas': 'Bahamas',
        'The Bahamas': 'Bahamas'
      };

      let probMap = {};
      let trendMap = {};
      let trendChartInstance = null;
      let selected = [];
      let geoLayer = null;
      let selectedLayers = [];

      const resultEl = document.getElementById('result');
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 2,
        maxZoom: 8
      }).setView([20, 0], 2);

      const worldBounds = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));
      map.setMaxBounds(worldBounds);
      map.options.maxBoundsViscosity = 1;


      document.getElementById('popup-close').addEventListener('click', hidePopup);
      document.getElementById('popup-overlay').addEventListener('click', function (e) {
        if (e.target === this) hidePopup();
      });

      const UPDATED_COUNTRIES_BASE = 'data/updated_countries';
      const PROB_BIAS_FILE = 'prob_bias_<-2.6>.csv';
      const WEIGHTS_FILE = 'data/weights.json';

      let modelWeights = { bias: null, weights: null };

      function sigmoid(z) {
        return 1 / (1 + Math.exp(-z));
      }

      function computeProbabilityFromRow(row, bias, weights) {
        if (row.length < 12 || !weights || weights.length !== 9) return null;
        let z = typeof bias === 'number' && !Number.isNaN(bias) ? bias : 0;
        for (let k = 0; k < 9; k++) {
          const x = parseFloat(row[3 + k]);
          const w = weights[k];
          if (!Number.isNaN(x) && typeof w === 'number') z += w * x;
        }
        return sigmoid(z);
      }

      function loadWeights() {
        return fetch(WEIGHTS_FILE)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(data => {
            if (typeof data.bias === 'number' && Array.isArray(data.weights) && data.weights.length === 9) {
              modelWeights = { bias: data.bias, weights: data.weights };
            }
          })
          .catch(() => {});
      }

      function parseDateFromFilename(filename) {
        const m = filename.match(/prob_hot_country_(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})-(\d{2})\.csv$/);
        if (!m) return null;
        const y = parseInt(m[1], 10);
        const mon = parseInt(m[2], 10) - 1;
        const d = parseInt(m[3], 10);
        const h = parseInt(m[4], 10);
        const min = parseInt(m[5], 10);
        const s = parseInt(m[6], 10);
        return new Date(y, mon, d, h, min, s);
      }

      function fillProbMapFromRow(key, row) {
        if (row.length < 3) return;
        if (String(row[2]).startsWith('ERROR')) {
          probMap[key] = { prob: row[2], contributions: null };
          return;
        }
        let num;
        let bias;
        const useWeights = modelWeights.weights && modelWeights.weights.length === 9;
        if (useWeights && row.length >= 12) {
          num = computeProbabilityFromRow(row, modelWeights.bias, modelWeights.weights);
          bias = modelWeights.bias;
        } else {
          num = parseFloat(row[2]);
          bias = row.length > 12 ? parseFloat(row[12]) : null;
        }
        if (num == null || Number.isNaN(num)) return;
        const contributions = buildContributionsFromRow(row, useWeights ? modelWeights.weights : null);
        const logit = num > 0 && num < 1 ? Math.log(num / (1 - num)) : null;
        probMap[key] = {
          prob: num,
          contributions: contributions || [],
          logit: logit,
          bias: bias != null && !Number.isNaN(bias) ? bias : null
        };
      }

      function buildCsvToGeoAliases() {
        const m = {};
        for (const csvName of new Set(Object.values(GEO_TO_CSV))) {
          m[csvName] = [csvName];
        }
        for (const geo in GEO_TO_CSV) {
          const c = GEO_TO_CSV[geo];
          if (!m[c]) m[c] = [c];
          if (m[c].indexOf(geo) === -1) m[c].push(geo);
        }
        return m;
      }

      function loadProbBias() {
        const csvToGeo = buildCsvToGeoAliases();
        const url = 'data/' + encodeURIComponent(PROB_BIAS_FILE);
        return fetch(url)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            text = text.replace(/^\uFEFF/, '').trim();
            const lines = text.split(/\r?\n/);
            for (let i = 1; i < lines.length; i++) {
              const row = parseCSVLine(lines[i]);
              if (row.length >= 3) {
                const csvA = row[0].trim();
                const csvB = row[1].trim();
                const key = normKey(csvA, csvB);
                fillProbMapFromRow(key, row);
                const aliasesA = csvToGeo[csvA] || [csvA];
                const aliasesB = csvToGeo[csvB] || [csvB];
                for (let a = 0; a < aliasesA.length; a++) {
                  for (let b = 0; b < aliasesB.length; b++) {
                    const altKey = normKey(aliasesA[a], aliasesB[b]);
                    if (probMap[altKey] === undefined) probMap[altKey] = probMap[key];
                  }
                }
              }
            }
          })
          .catch(() => {});
      }

      function loadTrendData() {
        return fetch(UPDATED_COUNTRIES_BASE + '/manifest.json')
          .then(r => r.json())
          .then(files => {
            const withDate = files.map(f => ({ f, date: parseDateFromFilename(f) })).filter(x => x.date);
            withDate.sort((a, b) => a.date.getTime() - b.date.getTime());
            const latestRowByKey = {};
            const promises = withDate.map(({ f, date }) => {
              return fetch(UPDATED_COUNTRIES_BASE + '/' + f)
                .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
                .then(text => {
                  const rows = splitCSVRows(text);
                  for (let i = 1; i < rows.length; i++) {
                    const row = parseCSVLine(rows[i]);
                    if (row.length >= 3) {
                      const key = normKey(row[0], row[1]);
                      let prob;
                      if (modelWeights.weights && modelWeights.weights.length === 9 && row.length >= 12) {
                        prob = computeProbabilityFromRow(row, modelWeights.bias, modelWeights.weights);
                      } else {
                        prob = parseFloat(row[2]);
                      }
                      if (prob == null || Number.isNaN(prob)) continue;
                      if (!trendMap[key]) trendMap[key] = [];
                      trendMap[key].push({ date: date.getTime(), dateObj: date, prob: prob });
                      latestRowByKey[key] = row;
                    }
                  }
                })
                .catch(() => {});
            });
            return Promise.allSettled(promises).then(() => latestRowByKey);
          })
          .then(latestRowByKey => {
            Object.keys(trendMap).forEach(k => {
              trendMap[k].sort((a, b) => a.date - b.date);
              if (latestRowByKey[k]) fillProbMapFromRow(k, latestRowByKey[k]);
            });
          })
          .catch(() => {});
      }

      function normKey(a, b) {
        return [a, b].sort().join('|');
      }

      function csvName(geoName) {
        if (!geoName) return null;
        return GEO_TO_CSV[geoName] || geoName;
      }

      function setResult(html, isPlaceholder) {
        const contentEl = resultEl.querySelector('.result-content');
        if (contentEl) contentEl.innerHTML = html;
        resultEl.classList.toggle('empty', isPlaceholder);
      }

      function getData(name1, name2) {
        const a = csvName(name1);
        const b = csvName(name2);
        if (!a || !b) return null;
        const key = normKey(a, b);
        const val = probMap[key];
        if (val === undefined) return null;
        if (typeof val === 'object' && val !== null) return val;
        if (typeof val === 'string' && val.startsWith('ERROR')) return { prob: val, explanation: '' };
        return { prob: Number(val), explanation: '' };
      }

      function getRiskLevel(prob) {
        if (prob < 0.15) return { label: 'Low risk', className: 'risk-low' };
        if (prob < 0.4) return { label: 'Medium risk', className: 'risk-medium' };
        return { label: 'High risk', className: 'risk-high' };
      }

      function parseExplanation(text) {
        if (!text || !text.trim()) return null;
        const out = { logit: null, bias: null, contributions: [] };
        const logitMatch = text.match(/logit z = ([-\d.]+)/);
        const biasMatch = text.match(/bias = ([-\d.]+)/);
        if (logitMatch) out.logit = parseFloat(logitMatch[1]);
        if (biasMatch) out.bias = parseFloat(biasMatch[1]);
        const bulletRegex = /^\s*•\s+(.+?)\s+=\s+([\d.]+)\s+\(weight\s+([+-]?[\d.]+)\)\s+→\s+contribution\s+([+-]?[\d.]+)\s+\((increases risk|neutral risk|lowers risk|decreases risk)\)\.?\s*(.*)$/gm;
        let m;
        while ((m = bulletRegex.exec(text)) !== null) {
          out.contributions.push({
            name: m[1].trim(),
            value: parseFloat(m[2]),
            weight: parseFloat(m[3]),
            contribution: parseFloat(m[4]),
            effect: m[5],
            description: (m[6] || '').trim()
          });
        }
        return out;
      }

      function renderExplanation(parsed) {
        if (!parsed || !parsed.contributions.length) return '';
        const summary = parsed.logit != null && parsed.bias != null
          ? `Model: logit z = ${parsed.logit.toFixed(2)}, bias = ${parsed.bias.toFixed(2)}.`
          : '';
        const effectClass = function (effect) {
          if (effect === 'increases risk') return 'contrib-up';
          if (effect === 'lowers risk' || effect === 'decreases risk') return 'contrib-down';
          return 'contrib-neutral';
        };
        const effectLabel = function (effect) {
          if (effect === 'increases risk') return '↑ increases';
          if (effect === 'lowers risk' || effect === 'decreases risk') return '↓ lowers';
          return '— neutral';
        };
        const fmt = (n) => (n >= 0 ? '+' : '') + n.toFixed(3);
        let rows = parsed.contributions.map(function (c) {
          return `<tr><td>${escapeHtml(c.name)}</td><td>${c.value.toFixed(3)}</td><td class="${effectClass(c.effect)}">${fmt(c.contribution)}</td><td class="${effectClass(c.effect)}">${effectLabel(c.effect)}</td></tr>`;
        }).join('');
        return (summary ? `<div class="explain-summary">${summary}</div>` : '') +
          '<table class="explain-table"><thead><tr><th>Feature</th><th>Value</th><th>Contribution</th><th>Effect</th></tr></thead><tbody>' + rows + '</tbody></table>';
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function formatTrendLabel(dateObj) {
        const d = dateObj;
        return d.getDate().toString().padStart(2, '0') + '/' + (d.getMonth() + 1).toString().padStart(2, '0') + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      }

      function renderTrendChart(key) {
        const points = trendMap[key];
        if (!points || points.length < 2) return;
        const trendWrap = document.getElementById('popup-trend-wrap');
        const canvas = document.getElementById('popup-trend-chart');
        const captionEl = document.getElementById('popup-trend-caption');
        if (trendChartInstance) {
          trendChartInstance.destroy();
          trendChartInstance = null;
        }
        const ctx = canvas.getContext('2d');
        const labels = points.map(p => formatTrendLabel(p.dateObj));
        const values = points.map(p => Math.round(p.prob * 10000) / 100);
        const last = points[points.length - 1];
        if (captionEl) captionEl.textContent = 'Latest snapshot: ' + formatTrendLabel(last.dateObj);

        const gradient = ctx.createLinearGradient(0, 0, 0, 200);
        gradient.addColorStop(0, 'rgba(56, 189, 248, 0.25)');
        gradient.addColorStop(0.5, 'rgba(56, 189, 248, 0.08)');
        gradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

        trendChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Probability %',
              data: values,
              borderColor: 'rgba(56, 189, 248, 1)',
              backgroundColor: gradient,
              fill: true,
              tension: 0.35,
              pointRadius: 4,
              pointHoverRadius: 6,
              pointBackgroundColor: 'rgba(56, 189, 248, 1)',
              pointBorderColor: 'rgba(15, 23, 42, 0.8)',
              pointBorderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 2.1,
            layout: { padding: { top: 8, right: 12, bottom: 4, left: 4 } },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                titleColor: '#e2e8f0',
                bodyColor: '#94a3b8',
                borderColor: 'rgba(148, 163, 184, 0.25)',
                borderWidth: 1,
                padding: 10,
                displayColors: true,
                callbacks: {
                  label: function (ctx) { return ctx.parsed.y.toFixed(2) + '%'; }
                }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(148, 163, 184, 0.08)' },
                ticks: { color: '#94a3b8', maxRotation: 40, font: { size: 11 } }
              },
              y: {
                min: 0,
                max: 100,
                grid: { color: 'rgba(148, 163, 184, 0.08)' },
                ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => v + '%' }
              }
            }
          }
        });
      }

      function showPopup(countryA, countryB, data) {
        const a = csvName(countryA);
        const b = csvName(countryB);
        const trendKey = (a && b) ? normKey(a, b) : null;
        const hasTrend = trendKey && trendMap[trendKey] && trendMap[trendKey].length >= 1;
        const latestFromTrend = hasTrend ? trendMap[trendKey][trendMap[trendKey].length - 1].prob : null;
        const prob = (hasTrend && latestFromTrend != null) ? latestFromTrend : (typeof data.prob === 'number' ? data.prob : 0);
        const pct = (prob * 100).toFixed(2);
        const risk = getRiskLevel(prob);
        const oneIn = prob <= 0 || prob >= 1 ? '—' : (1 / prob).toFixed(0);
        document.getElementById('popup-countries').innerHTML = `${countryA}<span class="sep">↔</span>${countryB}`;
        document.getElementById('popup-prob').textContent = pct + '%';
        const riskEl = document.getElementById('popup-risk');
        riskEl.innerHTML = typeof data.prob === 'string' ? `<span class="error-msg">${data.prob}</span>` : `<span class="risk-badge ${risk.className}">${risk.label}</span>`;
        riskEl.className = '';
        document.getElementById('popup-hint').textContent = prob > 0 && prob < 1 ? `Roughly 1 in ${oneIn} chance of escalation between this pair.` : '';
        const trendWrap = document.getElementById('popup-trend-wrap');
        const popupBox = document.getElementById('popup-box');
        if (trendKey && trendMap[trendKey] && trendMap[trendKey].length >= 2) {
          renderTrendChart(trendKey);
          trendWrap.style.display = 'block';
          popupBox.classList.add('has-trend');
        } else {
          trendWrap.style.display = 'none';
          popupBox.classList.remove('has-trend');
          if (trendChartInstance) {
            trendChartInstance.destroy();
            trendChartInstance = null;
          }
        }
        const explEl = document.getElementById('popup-explanation');
        const explWrap = document.getElementById('popup-explanation-wrap');
        if (data.contributions && data.contributions.length > 0) {
          const p = typeof data.prob === 'number' ? data.prob : 0;
          const logit = p > 0 && p < 1 ? Math.log(p / (1 - p)) : null;
          const parsed = { logit, bias: data.bias != null ? data.bias : null, contributions: data.contributions };
          explEl.innerHTML = renderExplanation(parsed);
          explWrap.style.display = 'block';
        } else if (data.explanation && data.explanation.trim()) {
          const parsed = parseExplanation(data.explanation);
          if (parsed && parsed.contributions.length > 0) {
            explEl.innerHTML = renderExplanation(parsed);
            explWrap.style.display = 'block';
          } else {
            explEl.textContent = data.explanation.trim();
            explWrap.style.display = 'block';
          }
        } else {
          explWrap.style.display = 'none';
        }
        document.getElementById('popup-overlay').classList.add('visible');
        document.getElementById('popup-overlay').setAttribute('aria-hidden', 'false');
      }

      function hidePopup() {
        document.getElementById('popup-overlay').classList.remove('visible');
        document.getElementById('popup-overlay').setAttribute('aria-hidden', 'true');
      }

      function updateResult() {
        if (selected.length === 0) {
          setResult('Select the first country...', true);
          return;
        }
        if (selected.length === 1) {
          setResult('Now select the second country.', true);
          return;
        }
        const [a, b] = selected;
        const data = getData(a, b);
        if (data === null) {
          setResult(`Pair <strong>${a}</strong> – <strong>${b}</strong>: data not available.`, false);
          return;
        }
        const prob = data.prob;
        if (typeof prob === 'string') {
          setResult(`Pair <strong>${a}</strong> – <strong>${b}</strong>: <span class="error-msg">${prob}</span>`, false);
          showPopup(a, b, data);
          return;
        }
        const pct = (prob * 100).toFixed(2);
        setResult(`Escalation probability between <strong>${a}</strong> and <strong>${b}</strong>: <span class="prob">${pct}%</span>`, false);
        showPopup(a, b, data);
      }

      function selectCountry(name, layer) {
        if (selected.includes(name)) return;
        if (selected.length === 2) {
          selected = [];
          selectedLayers.forEach(l => l.setStyle({ fillColor: '#334155', fillOpacity: 0.5 }));
          selectedLayers = [];
        }
        selected.push(name);
        if (layer) {
          layer.setStyle({ fillColor: '#0ea5e9', fillOpacity: 0.85 });
          selectedLayers.push(layer);
        }
        updateResult();
      }

      function loadGeoJson() {
        return fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
          .then(r => r.json())
          .then(geojson => {
            geoLayer = L.geoJSON(geojson, {
              style: { color: '#334155', weight: 0.5, fillColor: '#334155', fillOpacity: 0.5 },
              onEachFeature: function (feature, layer) {
                const name = feature.properties.ADMIN || feature.properties.name || '';
                layer.bindTooltip(name, {
                  permanent: false,
                  direction: 'top',
                  className: 'country-tooltip',
                  offset: [0, -5]
                });
                layer.on('click', function () {
                  selectCountry(name, layer);
                });
              }
            }).addTo(map);
          })
          .catch(() => setResult('Error loading map.', false));
      }

      function splitCSVRows(text) {
        const rows = [];
        let start = 0;
        let inQuotes = false;
        for (let i = 0; i <= text.length; i++) {
          const c = text[i] || '\n';
          if (c === '"') inQuotes = !inQuotes;
          else if ((c === '\n' || c === '\r') && !inQuotes) {
            rows.push(text.slice(start, i));
            if (c === '\r' && text[i + 1] === '\n') i++;
            start = i + 1;
          }
        }
        if (start < text.length) rows.push(text.slice(start));
        return rows;
      }

      function parseCSVLine(line) {
        const out = [];
        let cur = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') {
            inQuotes = !inQuotes;
          } else if (inQuotes) {
            cur += c;
          } else if (c === ',') {
            out.push(cur.trim());
            cur = '';
          } else {
            cur += c;
          }
        }
        out.push(cur.trim());
        return out;
      }

      const FEATURE_NAMES = [
        'News negativity',
        'News intensity',
        'Escalation / conflict events',
        'Shared border',
        'Geographic closeness',
        'Common official language',
        'Both in NATO',
        'Military expenditure (mean)',
        'Recent interstate conflict'
      ];

      function buildContributionsFromRow(row, weightsArray) {
        if (row.length < 12) return null;
        const contributions = [];
        for (let k = 0; k < 9; k++) {
          const val = parseFloat(row[3 + k]);
          const w = weightsArray != null && weightsArray[k] != null
            ? weightsArray[k]
            : (row.length >= 22 ? parseFloat(row[13 + k]) : NaN);
          if (Number.isNaN(val) || Number.isNaN(w)) continue;
          const c = val * w;
          let effect = 'neutral risk';
          if (c > 0) effect = 'increases risk';
          else if (c < 0) effect = 'decreases risk';
          contributions.push({
            name: FEATURE_NAMES[k],
            value: val,
            weight: w,
            contribution: c,
            effect: effect
          });
        }
        contributions.sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution));
        return contributions;
      }

      function getGeoName(csvName) {
        for (const geo in GEO_TO_CSV) {
          if (GEO_TO_CSV[geo] === csvName) return geo;
        }
        return csvName;
      }

      function loadHotPairsBanner() {
        const bannerEl = document.getElementById('hot-pairs-banner');
        const trackEl = document.getElementById('hot-pairs-track');
        if (!bannerEl || !trackEl) return;
        fetch(UPDATED_COUNTRIES_BASE + '/manifest.json')
          .then(r => r.json())
          .then(files => {
            const withDate = files.map(f => ({ f, date: parseDateFromFilename(f) })).filter(x => x.date);
            if (withDate.length === 0) return;
            withDate.sort((a, b) => a.date.getTime() - b.date.getTime());
            const latest = withDate[withDate.length - 1].f;
            return fetch(UPDATED_COUNTRIES_BASE + '/' + latest)
              .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); });
          })
          .then(text => {
            if (!text) return;
            const rows = splitCSVRows(text);
            const pairs = [];
            for (let i = 1; i < rows.length; i++) {
              const row = parseCSVLine(rows[i]);
              if (row.length >= 3) {
                let prob;
                if (modelWeights.weights && modelWeights.weights.length === 9 && row.length >= 12) {
                  prob = computeProbabilityFromRow(row, modelWeights.bias, modelWeights.weights);
                } else {
                  prob = parseFloat(row[2]);
                }
                if (prob != null && !Number.isNaN(prob)) {
                  pairs.push({ country_a: row[0].trim(), country_b: row[1].trim(), prob: prob });
                }
              }
            }
            pairs.sort((a, b) => b.prob - a.prob);
            const top = pairs.slice(0, 5);
            if (top.length === 0) return;
            function buildItemHtml(p) {
              const pct = (p.prob * 100).toFixed(1);
              const label = p.country_a + ' – ' + p.country_b + ' ' + pct + '%';
              return '<button type="button" class="hot-pair-item" data-country-a="' + escapeHtml(p.country_a) + '" data-country-b="' + escapeHtml(p.country_b) + '" title="View details">' +
                '<span class="hot-pair-dot" aria-hidden="true"></span>' +
                '<span>' + escapeHtml(p.country_a) + ' – ' + escapeHtml(p.country_b) + '</span>' +
                '<span class="hot-pair-pct">' + pct + '%</span></button>';
            }
            const fragment = top.map(buildItemHtml).join('');
            trackEl.innerHTML = fragment + fragment;
            bannerEl.classList.remove('hidden');
            trackEl.querySelectorAll('.hot-pair-item').forEach(btn => {
              btn.addEventListener('click', function () {
                const a = this.getAttribute('data-country-a');
                const b = this.getAttribute('data-country-b');
                if (!a || !b) return;
                selected = [];
                selectedLayers.forEach(l => l.setStyle({ fillColor: '#334155', fillOpacity: 0.5 }));
                selectedLayers = [];
                selected.push(a, b);
                if (geoLayer) {
                  const geoA = getGeoName(a);
                  const geoB = getGeoName(b);
                  geoLayer.getLayers().forEach(layer => {
                    const name = layer.feature.properties.ADMIN || layer.feature.properties.name || '';
                    if (name === geoA || name === geoB) {
                      layer.setStyle({ fillColor: '#0ea5e9', fillOpacity: 0.85 });
                      selectedLayers.push(layer);
                    }
                  });
                }
                updateResult();
              });
            });
          })
          .catch(() => {});
      }

      document.getElementById('hot-pairs-dismiss').addEventListener('click', function () {
        document.getElementById('hot-pairs-banner').classList.add('hidden');
      });

      loadWeights()
        .then(() => loadProbBias())
        .then(() => loadTrendData())
        .then(() => loadGeoJson())
        .then(() => loadHotPairsBanner())
        .catch(() => {
          setResult('Error loading data.', false);
          loadGeoJson();
        });
    })();
  </script>
</body>
</html>
