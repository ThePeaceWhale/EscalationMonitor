name: Update weekly news

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Dipendenze (se presenti)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Esegui generate_weekly_news.py
        run: python utils/generate_weekly_news.py

      - name: Commit e push se weekly_news.json è cambiato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/weekly_news.json
            git commit -m "chore: update weekly_news.json [skip ci]"
            git push
          else
            echo "Nessuna modifica da committare."
          fi
