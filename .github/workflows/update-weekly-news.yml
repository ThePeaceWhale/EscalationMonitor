name: Update weekly news

on:
  schedule:
    - cron: '0 7 * * *'   # ogni giorno alle 07:00 UTC
  workflow_dispatch:       # esecuzione manuale dal tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate weekly news
        run: |
          python utils/generate_weekly_news.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/weekly_news.json
            git commit -m "chore: update weekly_news.json [skip ci]"
            git push
          else
            echo "Nessuna modifica da committare."
          fi
